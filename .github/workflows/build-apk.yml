name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Create Placeholder Assets
        run: |
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:#1a73e8 assets/icon.png
          convert -size 1024x1024 xc:#1a73e8 assets/adaptive-icon.png
          convert -size 1284x2778 xc:#1a73e8 assets/splash.png
          echo "✅ Assets created"

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        run: eas build --platform android --profile preview --non-interactive

      - name: Build Complete
        run: |
          echo "✅ Build complete!"
          echo "APK: https://expo.dev/accounts/chnalp/projects/ocr-excel-app/builds"
