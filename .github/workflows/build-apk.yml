name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Placeholder Assets
        run: |
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 xc:#1a73e8 assets/icon.png
          convert -size 1024x1024 xc:#1a73e8 assets/adaptive-icon.png
          convert -size 1284x2778 xc:#1a73e8 assets/splash.png
          echo "Assets created successfully"

      - name: Install Dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          cp "$APK_PATH" ./ocr-excel-app.apk
          echo "APK built successfully"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ocr-excel-app.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: ocr-excel-app.apk
          body: |
            ## OCR Excel App - Android APK
            - Commit: ${{ github.sha }}
            - Build Number: ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
